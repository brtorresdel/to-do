<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>To-Do List!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Acme&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theme">
        <button class="light">
            <img src="img/sun-solid.svg" alt="Light mode">
        </button>
        <button class="dark">
            <img src="img/moon-solid.svg" alt="Dark mode">
        </button>
    </div>
    <div class="header">
        <div class="title">
            <h1>To-do list!</h1>
        </div>
        <div class="btn-newTask">
            <button>
                <img src="img/plus-solid.svg" alt="Nova tarefa"> Nova tarefa
            </button>
        </div>
    </div>
    <div class="tarefas">
        Nenhuma tarefa neste momento!
    </div>
    <div class="tarefasRealizadas">
        <button>
            Tarefas realizadas <img src="img/check-solid.svg" alt=""> 
        </button>
    </div>
    <script src="index.js"></script>
</body>
</html>
