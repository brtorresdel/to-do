<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>To-Do List!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Acme&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="theme d-flex flex-row justify-content-end pt-2">
            <button>
                <img src="img/sun-solid.svg" alt="Light Mode">
            </button>
            <button>
                <img src="img/moon-solid.svg" alt="Dark Mode">
            </button>
        </div>
        <div class="header d-flex flex-row justify-content-center pt-4">
            <div class="title">
                To-do List!
            </div>
            <button class="newTask">
                <img src="img/plus-solid.svg" alt=""> Nova tarefa
            </button>
        </div>
        <div class="tasks">
            Nenhuma tarefa adicionada até o momento!
        </div>
        <div class="doneTasks">

        </div>
    </div>
</body>
</html>
